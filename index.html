<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Optimum Puzzle</title>
  <meta name="description" content="Optimum Puzzle — solve the puzzle, race the clock, join the Optimum community."/>
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ─── OPTIMUM DESIGN LANGUAGE ─── */
    :root {
      --bg:         #FFFBFB;
      --white:      #ffffff;
      --ink:        #282C34;
      --ink-mid:    #4A5160;
      --ink-light:  #8C9AAC;
      --line:       rgba(40,44,52,0.08);
      --line-mid:   rgba(40,44,52,0.14);

      /* Optimum brand gradient — Lavender → Azure/Indigo */
      --brand-1:    #B87CFF;  /* Lavender */
      --brand-2:    #51B1FE;  /* Azure */
      --brand-3:    #7A5CF0;  /* deep indigo-violet */

      --accent:     #282C34;
      --radius-sm:  8px;
      --radius-md:  14px;
      --radius-lg:  20px;
      --radius-xl:  28px;
      --font:       'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --shadow-sm:  0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md:  0 4px 16px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.06);
      --shadow-lg:  0 20px 60px rgba(0,0,0,0.1), 0 4px 16px rgba(0,0,0,0.06);
    }

    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    .app { display: flex; flex-direction: column; height: 100vh; width: 100%; }

    /* ─── HEADER ─── */
    .header {
      position: relative;
      z-index: 70;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 58px;
      border-bottom: 1px solid var(--line);
      background: var(--white);
      flex-shrink: 0;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -0.2px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .brand:hover { opacity: .75; }
    .brand img.logo { height: 22px; width: auto; display: block; }

    /* Game title in header */
    .header-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: none;
      user-select: none;
    }
    .header-title-main {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--ink);
      line-height: 1;
    }
    .header-title-sub {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-top: 2px;
    }

    .header-nav {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .nav-link {
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-mid);
      text-decoration: none;
      padding: 5px 10px;
      border-radius: var(--radius-sm);
      transition: color 0.15s, background 0.15s;
    }
    .nav-link:hover { color: var(--ink); background: var(--bg); }

    /* ─── PANEL ─── */
    .panel {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 24px;
      gap: 10px;
      border-bottom: 1px solid var(--line);
      background: var(--white);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .stats-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .stat {
      background: var(--bg);
      border: 1px solid var(--line-mid);
      border-radius: var(--radius-sm);
      padding: 5px 12px;
      min-width: 76px;
      text-align: center;
    }
    .stat small {
      display: block;
      color: var(--ink-light);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      margin-bottom: 1px;
    }
    .stat b { font-size: 14px; font-weight: 600; font-variant-numeric: tabular-nums; color: var(--ink); }
    .controls-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

    /* ─── BUTTONS ─── */
    .btn {
      position: relative;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 7px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line-mid);
      background: var(--white);
      color: var(--ink);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: -0.1px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.12s, border-color 0.12s, box-shadow 0.12s, transform 0.1s;
      box-shadow: var(--shadow-sm);
      -webkit-appearance: none;
      appearance: none;
    }
    .btn:hover { background: var(--bg); border-color: rgba(40,44,52,0.18); box-shadow: var(--shadow-md); }
    .btn:active { transform: scale(0.98); }

    /* Primary — brand gradient (Optimum lavender/indigo) */
    .btn.primary {
      background: linear-gradient(135deg, var(--brand-1), var(--brand-3));
      border-color: transparent;
      color: rgba(255,255,255,0.95);
      font-weight: 600;
      box-shadow: 0 4px 16px rgba(138,90,230,0.35);
    }
    .btn.primary:hover { filter: brightness(1.08); box-shadow: 0 6px 22px rgba(138,90,230,0.5); }

    /* Ghost/brand btn */
    .btn.brand-btn {
      background: linear-gradient(135deg, var(--brand-1), var(--brand-3));
      border-color: transparent;
      color: rgba(255,255,255,0.92);
      font-weight: 600;
      box-shadow: 0 4px 14px rgba(138,90,230,0.35);
    }
    .btn.brand-btn:hover { box-shadow: 0 6px 22px rgba(138,90,230,0.5); filter: brightness(1.05); }

    /* Brand outline */
    .btn.brand-outline {
      background: #F4ECFF;
      border: 1px solid #DCC4FF;
      color: #5B3F94;
      font-weight: 600;
    }
    .btn.brand-outline:hover {
      background: #EADCFF;
      border-color: #C9A8FF;
      color: #43266E;
    }

    /* Danger */
    .btn.danger { color: #b91c1c; border-color: rgba(185,28,28,0.2); }
    .btn.danger:hover { background: #fff5f5; border-color: rgba(185,28,28,0.35); }

    /* Toggle active */
    .btn.toggle.active {
      background: linear-gradient(135deg, var(--brand-1), var(--brand-3));
      border-color: transparent;
      color: rgba(255,255,255,0.95);
    }

    /* Pulse on Start */
    .btn.pulse { animation: softPulse 2.5s ease-in-out infinite; }
    @keyframes softPulse {
      0%,100% { box-shadow: 0 4px 16px rgba(138,90,230,0.35); }
      50%      { box-shadow: 0 4px 28px rgba(138,90,230,0.6); }
    }

    .btn.dev { display: none; }

    /* ─── BOARD ─── */
    .board-wrap { flex: 1; padding: 14px 24px; min-height: 0; overflow: hidden; }
    .board {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: var(--white);
      border: 1px solid var(--line-mid);
      box-shadow: var(--shadow-sm);
    }
    #canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      border-radius: var(--radius-lg);
      touch-action: none;
    }

    /* ─── OVERLAY ─── */
    .overlay {
      position: fixed; inset: 0;
      display: none;
      align-items: center; justify-content: center;
      z-index: 50;
    }
    #menuOverlay { background: transparent !important; }

    /* Frosted glass bg for non-menu overlays */
    .overlay:not(#menuOverlay):not(#winOverlay) {
      background: rgba(250,249,248,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    #winOverlay {
      background: rgba(250,249,248,0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    #menuBG { position: absolute; inset: 0; pointer-events: none; z-index: 1; }

    /* Menu card */
    .menu {
      position: relative; z-index: 2;
      background: var(--white);
      border: 1px solid var(--line-mid);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      padding: 0 32px 28px; overflow: hidden;
      min-width: 320px;
      max-width: min(92vw, 440px);
      width: 100%;
      text-align: center;
    }
    .menu-logo-wrap { margin: 0 auto 24px; width: 78% !important; max-width: 230px; aspect-ratio: 1/1; height: auto !important; border-radius: 50%; background: linear-gradient(145deg, #3A3F4A 0%, #1C1F25 100%); box-shadow: 0 0 0 6px rgba(184,124,255,0.16), 0 8px 32px rgba(40,44,52,0.3); display: flex; align-items: center; justify-content: center; }
    .menu-logo { display: block !important; width: 60% !important; height: auto !important; object-fit: contain; margin: 0 auto; }
    .menu h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--ink);
      margin-bottom: 20px;
      line-height: 1.2;
    }
    .menu-eyebrow {
      font-size: 12px;
      font-weight: 500;
      color: var(--ink-light);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .v { display: flex; flex-direction: column; gap: 10px; align-items: center; }
    .v .btn { width: 100%; max-width: 300px; padding: 13px 20px; font-size: 14px; border-radius: var(--radius-md); }
    .menu-divider { width: 100%; max-width: 300px; height: 1px; background: var(--line); margin: 4px 0; }

    /* ─── NAME GATE ─── */
    .nameGate { display: none; gap: 8px; width: 100%; max-width: 300px; }
    input[type="text"] {
      width: 100%;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line-mid);
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 400;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input[type="text"]:focus {
      border-color: var(--ink);
      box-shadow: 0 0 0 3px rgba(0,0,0,0.08);
      background: var(--white);
    }
    input[type="text"]::placeholder { color: var(--ink-light); }

    /* ─── HALL OF FAME ─── */
    #hofOverlay { overflow-y: auto; align-items: flex-start; padding: 82px 0 24px; }
    #hofOverlay .menu { max-width: min(92vw, 860px); overflow: visible; }
    .hof-title { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; color: var(--ink); margin-bottom: 4px; }
    .hof-subtitle { font-size: 11px; color: var(--ink-light); font-weight: 500; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 20px; }
    .hof-section { width: 100%; margin-bottom: 32px; }
    .hof-section-title { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--ink-light); margin-bottom: 14px; text-align: left; }

    /* 3-card carousel: sides blurred/scaled, center focused */
    .hof-carousel { position: relative; width: 100%; overflow: hidden; padding: 12px 0 8px; }
    .hof-track {
      display: flex; gap: 0;
      transition: transform 0.45s cubic-bezier(.4,0,.2,1);
      will-change: transform;
    }
    .hof-card-wrap {
      flex-shrink: 0;
      /* each card takes 1/3 of container */
      width: calc(100% / 3);
      padding: 0 8px;
      box-sizing: border-box;
      transition: transform 0.45s cubic-bezier(.4,0,.2,1), filter 0.45s ease, opacity 0.45s ease;
      cursor: pointer;
    }
    .hof-card-wrap canvas {
      width: 100%; aspect-ratio: 1/1;
      border-radius: 14px; display: block;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      transition: box-shadow 0.45s ease;
    }
    /* Side cards — small, blurred, dim */
    .hof-card-wrap.side {
      transform: scale(0.78);
      filter: blur(2.5px) brightness(0.55);
      opacity: 0.7;
    }
    /* Center card — big, sharp, bright */
    .hof-card-wrap.center {
      transform: scale(1.08);
      filter: none;
      opacity: 1;
      z-index: 2;
    }
    .hof-card-wrap.center canvas {
      box-shadow: 0 16px 56px rgba(0,0,0,0.3), 0 0 0 2px rgba(255,255,255,0.12);
    }
    .hof-card-wrap.center:hover { transform: scale(1.11); }
    .hof-card-wrap.hidden { opacity: 0; pointer-events: none; }

    /* Nav */
    .hof-nav { display: flex; align-items: center; gap: 10px; margin-top: 16px; justify-content: center; }
    .hof-nav-btn { background: var(--white); border: 1px solid var(--line-mid); border-radius: 50%; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 15px; color: var(--ink-mid); box-shadow: var(--shadow-sm); transition: background .15s, transform .1s; flex-shrink: 0; }
    .hof-nav-btn:hover { background: var(--bg); color: var(--ink); transform: scale(1.08); }
    .hof-nav-btn:disabled { opacity: 0.25; cursor: default; transform: none; }
    .hof-dots { display: flex; gap: 6px; align-items: center; }
    .hof-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--line-mid); transition: background .25s, width .25s; }
    .hof-dot.active { background: var(--ink); width: 18px; border-radius: 3px; }

    /* Player modal */
    .hof-modal {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(10,10,10,0.75);
      backdrop-filter: blur(10px);
      display: none; align-items: center; justify-content: center;
      padding: 16px;
    }
    .hof-modal.open { display: flex; }
    .hof-modal-inner { position: relative;
      background: var(--white); border: 1px solid var(--line-mid);
      border-radius: var(--radius-xl); box-shadow: var(--shadow-lg);
      width: 100%; max-width: 420px; max-height: 85vh;
      overflow-y: auto; padding: 28px;
    }
    .hof-modal-header { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 20px; text-align: center; }
    .hof-modal-canvas { width: 340px; height: 340px; border-radius: 18px; flex-shrink: 0; }
    .hof-modal-info { text-align: center; }
    .hof-modal-name { font-size: 20px; font-weight: 800; letter-spacing: -0.3px; color: var(--ink); }
    .hof-modal-best { font-size: 13px; color: var(--ink-light); margin-top: 3px; }
    .hof-modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 22px; cursor: pointer; color: var(--ink-light); padding: 0; line-height: 1; }
    .hof-modal-close:hover { color: var(--ink); }
    .hof-attempts-title { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--ink-light); margin-bottom: 10px; }
    .hof-attempt-row { display: grid; grid-template-columns: 24px 1fr auto auto; gap: 8px; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--line); font-size: 13px; }
    .hof-attempt-row:last-child { border-bottom: none; }
    .hof-attempt-rank { font-size: 11px; color: var(--ink-light); font-weight: 600; }
    .hof-attempt-time { font-weight: 700; color: var(--ink); font-variant-numeric: tabular-nums; }
    .hof-attempt-moves { color: var(--ink-mid); }
    .hof-attempt-date { font-size: 11px; color: var(--ink-light); text-align: right; }
    .hof-attempt-row.best .hof-attempt-time { color: #16a34a; }
    .hof-attempt-row.best .hof-attempt-rank::before { content: "★"; color: #f59e0b; }

    .hof-empty { color: var(--ink-light); font-size: 13px; padding: 12px 0; }
    #hofList { width: 100%; }

    /* ─── LEADERBOARD ─── */
    #lbList { max-height: 50vh; overflow-y: auto; text-align: left; scrollbar-width: thin; scrollbar-color: var(--line-mid) transparent; }
    .lbrow { display: grid; grid-template-columns: 36px 1fr 90px 70px; gap: 10px; padding: 9px 4px; border-bottom: 1px solid var(--line); font-size: 13px; font-weight: 500; color: var(--ink-mid); }
    .lbrow:last-child { border-bottom: none; }
    .lbrow b { font-weight: 700; color: var(--ink); }
    .lbrow:first-child { color: var(--ink); }
    .lbrow:first-child b { color: var(--brand-1); }

    /* ─── WIN ─── */
    #winOverlay { z-index: 60; }
    .win-inner { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-start; justify-content: center; }
    #shareCanvas { border-radius: var(--radius-md); border: 1px solid var(--line-mid); max-width: 360px; width: 100%; }

    /* ─── FX ─── */
    #fxCanvas { position: fixed; inset: 0; pointer-events: none; z-index: 70; display: none; }

    /* ─── FOLLOW DOCK ─── */
    .followDock {
      position: fixed; right: 16px; bottom: 16px; z-index: 1000;
      display: flex; gap: 8px; align-items: center; flex-direction: column;
    }
    .btn.follow-btn {
      width: auto; min-width: 148px; height: 36px;
      padding: 0 14px;
      border-radius: var(--radius-sm);
      font-size: 12px; font-weight: 600;
      white-space: nowrap;
      background: var(--white);
      border: 1px solid var(--line-mid);
      color: var(--ink-mid);
      box-shadow: var(--shadow-sm);
    }
    .btn.follow-btn:hover { color: var(--ink); border-color: var(--ink); }
    body.is-menu .followDock { z-index: 2000; }

    /* ─── MODAL ─── */
    .modal {
      position: fixed; inset: 0;
      background: rgba(250,249,248,0.8);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: none; align-items: center; justify-content: center;
    }
    .modal-inner {
      background: var(--white);
      border: 1px solid var(--line-mid);
      border-radius: var(--radius-xl);
      padding: 28px;
      max-width: min(92vw, 400px);
      width: 100%;
      box-shadow: var(--shadow-lg);
    }
    .modal-inner h2 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 6px; }
    .modal-inner p { font-size: 13px; color: var(--ink-light); margin-bottom: 16px; line-height: 1.5; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

    /* ─── VOLUME CONTROL ─── */
    .vol-btn { font-size: 12px; font-weight: 600; color: var(--ink-mid); min-width: 64px; }
    .vol-popup {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: var(--white);
      border: 1px solid var(--line-mid);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      padding: 14px 16px;
      width: 200px;
      z-index: 200;
      display: none;
    }
    .vol-popup.open { display: block; }
    .vol-popup label {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 12px; font-weight: 600; color: var(--ink-mid);
      margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .vol-popup label span { color: var(--ink); font-variant-numeric: tabular-nums; }

    /* ─── JOIN OPTIMUM hover popup (site / discord / x) — header ─── */
    .join-wrap { position: relative; display: inline-flex; }
    .join-popup {
      position: absolute;
      top: 100%;
      right: 0;
      padding-top: 12px; /* invisible bridge so cursor can travel from button to icons */
      display: flex; gap: 8px;
      opacity: 0; pointer-events: none;
      transition: opacity .16s ease, transform .16s ease;
      transform: translateY(-6px);
      z-index: 210;
    }
    .join-popup-inner {
      display: flex; gap: 8px;
      background: var(--white);
      border: 1px solid var(--line-mid);
      border-radius: 999px;
      box-shadow: var(--shadow-lg);
      padding: 8px;
      position: relative;
    }
    .join-popup-inner::before {
      content: ""; position: absolute; top: -5px; right: 22px; transform: rotate(45deg);
      width: 10px; height: 10px; background: var(--white);
      border-left: 1px solid var(--line-mid); border-top: 1px solid var(--line-mid);
    }
    .join-wrap:hover .join-popup, .join-wrap:focus-within .join-popup {
      opacity: 1; pointer-events: auto; transform: translateY(0);
    }
    .join-popup a {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg); color: var(--ink-mid);
      transition: background .15s, color .15s, transform .15s;
      flex-shrink: 0;
    }
    .join-popup a:hover { background: var(--brand-1); color: #fff; transform: scale(1.08); }
    .join-popup a svg { width: 17px; height: 17px; }
    .vol-slider {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 4px;
      border-radius: 99px;
      background: linear-gradient(to right, var(--brand-2) 50%, var(--line-mid) 50%);
      outline: none; cursor: pointer; border: none;
    }
    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--brand-2);
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
      cursor: pointer;
    }
    .vol-slider::-moz-range-thumb {
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--brand-2); border: none;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2); cursor: pointer;
    }
    .vol-mute-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 10px;
    }
    .vol-mute-row span { font-size: 12px; color: var(--ink-mid); font-weight: 500; }

    /* ─── STATE ─── */

  const gA=p.group,th=Math.min(tileW,tileH)*.34;
  for(const[nr,nc]of[[p.r,p.c-1],[p.r,p.c+1],[p.r-1,p.c],[p.r+1,p.c]]){
    const q=pieceAt(nr,nc);if(!q||q.group===gA)continue;
    const ox=(q.tx-p.tx)-(q.x-p.x),oy=(q.ty-p.ty)-(q.y-p.y);
    if(Math.hypot(ox,oy)<th){moveGroup(q.group,ox,oy);mergeGroups(gA,q.group);if(window.__playSnap)window.__playSnap();return true;}
  }
  return false;
}
let draggingPiece=null,draggingGroup=null,lastPX=0,lastPY=0;
function reorderGroupToTop(g){const o=[],gm=[];for(const p of pieces)(p.group===g?gm:o).push(p);pieces=o.concat(gm);}
function groupBounds(g){let a=1/0,b=1/0,c=-1/0,d=-1/0;for(const p of g.pieces){if(p.x<a)a=p.x;if(p.y<b)b=p.y;if(p.x+p.bw>c)c=p.x+p.bw;if(p.y+p.bh>d)d=p.y+p.bh;}return{minX:a,minY:b,maxX:c,maxY:d};}
function clampDeltaToCanvas(g,dx,dy){const cs=getCanvasCSSSize();const M=6,b=groupBounds(g);if(b.minX+dx<M)dx=M-b.minX;if(b.minY+dy<M)dy=M-b.minY;if(b.maxX+dx>cs.w-M)dx=(cs.w-M)-b.maxX;if(b.maxY+dy>cs.h-M)dy=(cs.h-M)-b.maxY;return{dx,dy};}
function pointerDown(x,y){if(finished||inMenu)return;startTimerOnce();for(let i=pieces.length-1;i>=0;i--){const p=pieces[i];if(hitPiece(p,x,y)){draggingPiece=p;draggingGroup=p.group;lastPX=x;lastPY=y;reorderGroupToTop(draggingGroup);break;}}}
function pointerMove(x,y){if(!draggingGroup)return;let dx=x-lastPX,dy=y-lastPY;const c=clampDeltaToCanvas(draggingGroup,dx,dy);dx=c.dx;dy=c.dy;moveGroup(draggingGroup,dx,dy);lastPX+=dx;lastPY+=dy;draw(ghostOn);}
async function pointerUp(x,y){
  if(!draggingGroup)return;draggingPiece=null;moves++;movesEl.textContent=moves;
  if(useMagnet){let a=true;while(a){a=false;const base=[...draggingGroup.pieces];for(const p of base)if(tryMagnetizeFrom(p)){a=true;break;}}}
  if(allInOneGroup()){finished=true;stopTimer();statusEl.textContent="Solved";CANVAS.animate([{opacity:1},{opacity:.9},{opacity:1}],{duration:300});await saveScore({timeMs:Math.round(elapsed),moves,rows:ROWS,cols:COLS});}
  draggingGroup=null;draw(ghostOn);
}

function drawHofCard(canvas,cardImg,name,timeMs,movesVal,accentColor){
  const CW=2000,CH=2000;
  canvas.width=CW; canvas.height=CH;
  const ctx=canvas.getContext("2d");
  ctx.drawImage(cardImg,0,0,CW,CH);
  /* LCD top-left */
  const mins=Math.floor(timeMs/60000);
  const secs=Math.floor((timeMs%60000)/1000);
  const tenths=Math.floor((timeMs%1000)/100);
  /* accent: blue card=#00c8ff, red card=#ff4444, default=lime */
  const ac=accentColor||"#b8ff00";
  const acGlow=accentColor==="#ff4444"?"rgba(255,60,60,0.6)":accentColor==="#00c8ff"?"rgba(0,180,255,0.6)":"#60ff00";
  ctx.save();
  ctx.font="bold 88px 'Courier New',monospace";
  ctx.fillStyle=ac; ctx.shadowColor=acGlow; ctx.shadowBlur=22;
  ctx.textAlign="left";
  ctx.fillText(String(mins).padStart(2,"0")+":"+String(secs).padStart(2,"0")+"."+tenths+" TIME",46,128);
  ctx.font="bold 78px 'Courier New',monospace";
  ctx.fillText(String(movesVal).padStart(3,"0")+" MOV",46,228);
  ctx.restore();
  /* Graffiti name on hazard stripe (88.3%..100%) */
  const dn=(name||"ANON").slice(0,14).toUpperCase();
  const fs=Math.max(110,Math.min(185,Math.floor(1800/Math.max(dn.length,4))));
  ctx.font="900 "+fs+"px 'Arial Black',Impact,sans-serif";
  const met=ctx.measureText(dn);
  const asc=met.actualBoundingBoxAscent||fs*0.72;
  const desc=met.actualBoundingBoxDescent||fs*0.18;
  const stripeTop=CH*0.883, stripeBot=CH;
  const nameY=stripeTop+(stripeBot-stripeTop)/2+asc/2-desc/2;
  ctx.save();
  ctx.translate(CW/2,nameY); ctx.rotate(-0.035); ctx.textAlign="center";
  ctx.lineWidth=36; ctx.strokeStyle="rgba(0,0,0,0.97)"; ctx.lineJoin="round"; ctx.strokeText(dn,0,0);
  ctx.lineWidth=14; ctx.strokeStyle="rgba(255,220,0,0.5)"; ctx.strokeText(dn,0,0);
  const grad=ctx.createLinearGradient(0,-asc,0,desc);
  grad.addColorStop(0,"#ffffff"); grad.addColorStop(0.3,"#ffe84d"); grad.addColorStop(1,"#f5a623");
  ctx.fillStyle=grad; ctx.fillText(dn,0,0);
  ctx.restore();
}

function makeCarousel(players, cardImg, allScores, accentColor){
  const outer=document.createElement("div"); outer.className="hof-carousel";
  const track=document.createElement("div"); track.className="hof-track";
  const wraps=[];
  const list=players.slice(0,12);
  list.forEach((s,idx)=>{
    const wrap=document.createElement("div"); wrap.className="hof-card-wrap";
    const cv=document.createElement("canvas");
    wrap.appendChild(cv); track.appendChild(wrap); wraps.push(wrap);
    drawHofCard(cv,cardImg,s.name||"anon",s.timeMs||0,s.moves||0,accentColor);
    wrap.addEventListener("click",()=>{
      openPlayerModal(s, cardImg, allScores.get(s.name||"anon")||[], accentColor);
    });
  });
  outer.appendChild(track);

  const total=list.length;
  let cur=0;
  let autoTimer=null;
  let idleTimer=null;

  /* ── dots ── */
  const nav=document.createElement("div"); nav.className="hof-nav";
  const btnL=document.createElement("button"); btnL.className="hof-nav-btn"; btnL.innerHTML="&#8592;";
  const btnR=document.createElement("button"); btnR.className="hof-nav-btn"; btnR.innerHTML="&#8594;";
  const dotsWrap=document.createElement("div"); dotsWrap.className="hof-dots";
  const dots=[];
  for(let i=0;i<total;i++){
    const d=document.createElement("div");
    d.className="hof-dot"+(i===0?" active":"");
    dots.push(d); dotsWrap.appendChild(d);
  }

  function updateClasses(){
    wraps.forEach((w,i)=>{
      w.classList.remove("center","side","hidden");
      const diff=i-cur;
      if(diff===0)       w.classList.add("center");
      else if(Math.abs(diff)===1) w.classList.add("side");
      else               w.classList.add("hidden");
    });
  }

  /* cardW — measured reliably: always read from outer.offsetWidth */
  function cardW(){ return outer.offsetWidth / 3 || 260; }

  function applyPos(){
    /* center slot = index 1 of the 3 visible cards
       so first visible card starts at: cur*cardW - cardW */
    const offset = Math.max(0, (cur - 1) * cardW());
    track.style.transform = "translateX(-" + offset + "px)";
    dots.forEach((d,i) => d.classList.toggle("active", i===cur));
    btnL.disabled = cur===0;
    btnR.disabled = cur>=total-1;
    updateClasses();
  }

  function go(idx){
    cur = Math.max(0, Math.min(total-1, ((idx%total)+total)%total));
    applyPos();
  }

  /* ── auto-scroll ── */
  function stopAuto(){
    clearInterval(autoTimer); autoTimer=null;
    clearTimeout(idleTimer);  idleTimer=null;
  }
  function startAuto(){
    if(total<=1) return;
    stopAuto();
    autoTimer = setInterval(()=>{
      go(cur+1 < total ? cur+1 : 0);
    }, 2000);
  }
  function scheduleResume(){
    /* after user interaction, wait 3s then resume auto */
    clearTimeout(idleTimer);
    clearInterval(autoTimer); autoTimer=null;
    idleTimer = setTimeout(startAuto, 3000);
  }

  /* manual buttons — stop auto, schedule resume */
  btnL.addEventListener("click",()=>{ go(cur-1); scheduleResume(); });
  btnR.addEventListener("click",()=>{ go(cur+1); scheduleResume(); });

  /* hover pause / resume */
  outer.addEventListener("mouseenter",()=>stopAuto());
  outer.addEventListener("mouseleave",()=>startAuto());

  if(total<=1){
    btnL.style.display="none"; btnR.style.display="none"; dotsWrap.style.display="none";
  }
  nav.appendChild(btnL); nav.appendChild(dotsWrap); nav.appendChild(btnR);
  outer.appendChild(nav);

  /* re-apply position on resize so offset stays correct */
  const ro=new ResizeObserver(()=>applyPos());
  ro.observe(outer);

  /* init: wait until outer is actually in the DOM and has width */
  function tryInit(attempt){
    if(outer.offsetWidth > 0){
      applyPos();
      startAuto();
    } else if(attempt < 20){
      requestAnimationFrame(()=>tryInit(attempt+1));
    }
  }
  /* small delay so the element is appended to DOM before we measure */
  setTimeout(()=>tryInit(0), 0);

  return outer;
}

      sec.appendChild(th); sec.appendChild(makeCarousel(players,cardImg,allByPlayer,cardAccent)); hofListEl.appendChild(sec);

  }catch(e){console.error(e);hofListEl.innerHTML='<div class="hof-empty">Failed to load.</div>';}

const LOGO_IMG=new Image();let logoLoaded=false;
LOGO_IMG.src="optimum-icon-black.png";

let mobs=[],mouse={x:-9999,y:-9999},bgAnim=false;
function initMenuBG(){
  mobs.length=0;
  const w=menuBG.width||innerWidth,h=menuBG.height||innerHeight;
  for(let i=0;i<40;i++){
    const s=Math.random()*30+16;
    mobs.push({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()*2-1)*.3,vy:(Math.random()*2-1)*.3,size:s,rot:Math.random()*Math.PI*2,vr:(Math.random()*2-1)*.004,a:.16+Math.random()*.22});
  }
  bgAnim=true; /* always force-start */
  requestAnimationFrame(tickBG);
}
function tickBG(){
  if(!inMenu){bgAnim=false;return;}
  const w=menuBG.width,h=menuBG.height;
  /* Optimum gradient bg — Alabaster to Steel */
  const grad=mbgCtx.createLinearGradient(0,0,w,h);
  grad.addColorStop(0,"rgba(255,251,251,0.97)");
  grad.addColorStop(0.55,"rgba(231,236,240,0.93)");
  grad.addColorStop(1,"rgba(211,219,226,0.90)");
  mbgCtx.clearRect(0,0,w,h);mbgCtx.fillStyle=grad;mbgCtx.fillRect(0,0,w,h);
  if(!logoLoaded){requestAnimationFrame(tickBG);return;}

  for(const m of mobs){
    m.vx+=(Math.random()*2-1)*.015;m.vy+=(Math.random()*2-1)*.015;
    const mx=mouse.x*(menuBG.width/(menuBG.clientWidth||1)),my=mouse.y*(menuBG.height/(menuBG.clientHeight||1));
    const dx=m.x-mx,dy=m.y-my,R=120,R2=R*R,d2=dx*dx+dy*dy;
    if(d2<R2){const f=(R2-d2)/R2,ang=Math.atan2(dy,dx);m.vx+=Math.cos(ang)*f*1.0;m.vy+=Math.sin(ang)*f*1.0;}
    const sp=Math.hypot(m.vx,m.vy),max=1.2;if(sp>max){m.vx=m.vx/sp*max;m.vy=m.vy/sp*max;}
    m.vx*=.996;m.vy*=.996;m.x+=m.vx;m.y+=m.vy;m.rot+=m.vr;
    if(m.x<-60)m.x=w+60;if(m.x>w+60)m.x=-60;if(m.y<-60)m.y=h+60;if(m.y>h+60)m.y=-60;
    mbgCtx.save();mbgCtx.translate(m.x,m.y);mbgCtx.rotate(m.rot);mbgCtx.globalAlpha=m.a;
    const ar=(LOGO_IMG.naturalHeight&&LOGO_IMG.naturalWidth)?(LOGO_IMG.naturalHeight/LOGO_IMG.naturalWidth):0.55;
    const dw=m.size,dh=m.size*ar;
    mbgCtx.drawImage(LOGO_IMG,-dw/2,-dh/2,dw,dh);mbgCtx.restore();
  }
  requestAnimationFrame(tickBG);
}

    /* Square image box — height fills card, width = height */
    const rightW=280,imgSize=H-2*pad,imgBox={x:pad,y:pad,w:imgSize,h:imgSize};
    function rrp(x,y,w,h,r=20){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
    rrp(imgBox.x,imgBox.y,imgBox.w,imgBox.h,20);ctx.save();ctx.clip();
    if(img&&img.complete){
      const iw=img.naturalWidth||img.width,ih=img.naturalHeight||img.height;
      /* cover: scale so image fills the square completely */
      const scale=Math.max(imgBox.w/iw,imgBox.h/ih);
      const dw=Math.ceil(iw*scale),dh=Math.ceil(ih*scale);
      ctx.drawImage(img,Math.floor(imgBox.x+(imgBox.w-dw)/2),Math.floor(imgBox.y+(imgBox.h-dh)/2),dw,dh);
    }
    ctx.restore();
    /* rounded outline stroke */
    ctx.strokeStyle="rgba(40,44,52,0.14)";ctx.lineWidth=2;rrp(imgBox.x,imgBox.y,imgBox.w,imgBox.h,20);ctx.stroke();
    const rX=pad+imgSize+pad+8,name=getName()||"anonymous";
    ctx.font="300 11px Inter,Arial";ctx.fillStyle="rgba(40,44,52,0.55)";ctx.fillText("OPTIMUM PUZZLE",rX,pad+18);
    ctx.font="600 20px Inter,Arial";ctx.fillStyle="rgba(40,44,52,0.94)";ctx.fillText("Puzzle solved",rX,pad+44);
    ctx.fillStyle="rgba(40,44,52,0.14)";ctx.fillRect(rX,pad+54,rightW-16,1);
    const rows=[["Player",name],["Time",timeEl.textContent.trim()],["Moves",moves.toString()]];
    let ty=pad+80;
    rows.forEach(([label,val])=>{
      ctx.font="400 11px Inter,Arial";ctx.fillStyle="rgba(40,44,52,0.5)";ctx.fillText(label.toUpperCase(),rX,ty);ty+=18;
      ctx.font="600 16px Inter,Arial";ctx.fillStyle="rgba(40,44,52,0.94)";ctx.fillText(val,rX,ty);ty+=28;
    });
    ctx.font="400 11px Inter,Arial";ctx.fillStyle="rgba(40,44,52,0.4)";ctx.fillText("crpbase.github.io/Optimum_Puzzle",rX,H-pad-6);
    document.getElementById("winOverlay").style.display="flex";
  }catch(e){console.warn("share err",e);}
}
document.getElementById("downloadShareBtn").addEventListener("click",()=>{const sc=document.getElementById("shareCanvas"),a=document.createElement("a");a.href=sc.toDataURL("image/png");a.download="optimum-puzzle.png";a.click();});
document.getElementById("shareXBtn").addEventListener("click",()=>{const t=document.getElementById("time").textContent.trim();const txt=["Optimum Puzzle for @get_optimum","",`Solved in ${t} with ${moves} moves.`,"","by @crpbase & @dosunets_","","Try to beat my time → https://crpbase.github.io/Optimum_Puzzle/","","#OptimumPuzzle"].join("\n");window.open("https://twitter.com/intent/tweet?text="+encodeURIComponent(txt),"_blank");});

const statusObs=new MutationObserver(()=>{const t=statusEl.textContent.trim().toLowerCase();if(t.includes("solved")&&document.getElementById("winOverlay").style.display!=="flex"){if(window.__playVictory)window.__playVictory();confettiBurst();generateShare();}});

  devSolveBtn.addEventListener("click",async()=>{inMenu=false;document.body.classList.remove("is-menu");menuOverlay.style.display="none";buildPieces();const g={id:999,pieces:[]};for(const p of pieces){p.x=p.tx;p.y=p.ty;p.group=g;g.pieces.push(p);}draw(false);elapsed=Math.floor(Math.random()*4000)+1200;moves=Math.floor(Math.random()*10)+2;timeEl.textContent=fmt(elapsed);movesEl.textContent=moves;finished=true;statusEl.textContent="Solved";await saveScore({timeMs:Math.round(elapsed),moves,rows:ROWS,cols:COLS});});

<!-- AUDIO + UI -->
<script>
(function(){
  var bg=document.getElementById("bgMusic");
  if(!bg)return;
  bg.volume=0.5;

  function play(){
    bg.muted=false;
    bg.volume=0.5;
    var p=bg.play();
    if(p&&typeof p.catch==="function")p.catch(function(){});
  }

  /* Start immediately */
  play();

  /* Fallback: on first user gesture (covers browser autoplay block) */
  function onGesture(){
    play();
    ["click","touchstart","keydown","pointerdown"].forEach(function(ev){
      document.removeEventListener(ev,onGesture,true);
    });
  }
  ["click","touchstart","keydown","pointerdown"].forEach(function(ev){
    document.addEventListener(ev,onGesture,{once:false,capture:true,passive:true});
  });

  /* Also expose for mute button */
  window.__bgPlay=play;
  window.__bgStop=function(){ try{ bg.pause(); }catch(e){} };
})();
(function(){
  var sc=document.getElementById("sndClick"),sn=document.getElementById("sndSnap");
  function pl(a){try{if(!a)return;a.currentTime=0;a.play();}catch(e){}}
  document.addEventListener("click",function(e){const b=e.target.closest&&e.target.closest("button");if(b)pl(sc);},true);
  document.addEventListener("keydown",function(e){if((e.key==="Enter"||e.key===" ")&&document.activeElement&&document.activeElement.tagName==="BUTTON")pl(sc);},true);
  window.__playSnap=function(){pl(sn);};
})();
(function(){var a=document.getElementById("sndVictory");window.__playVictory=function(){try{if(a){a.currentTime=0;a.play();}}catch(e){}};})();

/* Volume control */
(function(){
  var bg=document.getElementById("bgMusic");
  var btn=document.getElementById("volBtn");
  var popup=document.getElementById("volPopup");
  var slider=document.getElementById("volSlider");
  var pct=document.getElementById("volPct");
  var muteBtn=document.getElementById("volMuteBtn");
  var muteLabel=document.getElementById("volMuteLabel");
  if(!bg||!btn||!popup||!slider)return;

  var muted=false, lastVol=0.5;

  function updateSliderTrack(v){
    slider.style.background="linear-gradient(to right,var(--brand-2) "+v+"%, var(--line-mid) "+v+"%)";
  }
  function setVol(v){
    lastVol=v; bg.volume=v; muted=false;
    var p=Math.round(v*100);
    btn.textContent="♪ "+p+"%";
    pct.textContent=p+"%";
    slider.value=p;
    updateSliderTrack(p);
    muteBtn.textContent="Mute"; muteLabel.textContent="Music on";
  }
  function toggleMute(){
    if(muted){ muted=false; bg.volume=lastVol; bg.muted=false; muteBtn.textContent="Mute"; muteLabel.textContent="Music on"; btn.textContent="♪ "+Math.round(lastVol*100)+"%"; }
    else { muted=true; bg.muted=true; muteBtn.textContent="Unmute"; muteLabel.textContent="Music off"; btn.textContent="♪ off"; }
  }

  setVol(0.5);

  btn.addEventListener("click",function(e){e.stopPropagation();popup.classList.toggle("open");});
  document.addEventListener("click",function(e){if(!popup.contains(e.target)&&e.target!==btn)popup.classList.remove("open");});
  slider.addEventListener("input",function(){setVol(this.value/100);});
  muteBtn.addEventListener("click",function(e){e.stopPropagation();toggleMute();});
})();
document.addEventListener("click",function(e){
  const t=e.target.closest&&e.target.closest(".btn");if(!t)return;
  const r=t.getBoundingClientRect(),s=document.createElement("span");
  s.style.cssText="position:absolute;border-radius:999px;pointer-events:none;left:"+(e.clientX-r.left-12)+"px;top:"+(e.clientY-r.top-12)+"px;width:24px;height:24px;background:rgba(0,0,0,0.06);transform:scale(0);opacity:1;transition:transform .45s ease-out,opacity .45s ease-out;";
  t.appendChild(s);requestAnimationFrame(()=>{s.style.transform="scale(10)";s.style.opacity="0";});setTimeout(()=>s.remove(),480);
});

/* Follow Dock */
(function(){
  function mkBtn(text,href){
    var a=document.createElement("a");
    a.className="btn follow-btn";a.textContent=text;
    a.href=href;a.target="_blank";a.rel="noopener noreferrer";
    return a;
  }
  function init(){
    if(document.querySelector(".followDock"))return;
    var dock=document.createElement("div");dock.className="followDock";
    dock.appendChild(mkBtn("Follow Baised","https://x.com/baisedit"));
    dock.appendChild(mkBtn("Follow Viktor","https://x.com/0xCryptoViktor_"));
    document.body.appendChild(dock);
  }
  if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",init,{once:true});else init();
})();
</script>
